jobs_dir: ./jobs
n_attempts: 3

orchestrator:
  n_concurrent_trials: 12

environment:
  type: modal
  kwargs:
    sandbox_timeout_secs: 9000

agents:
  - name: terminus-2
    model_name: anthropic/claude-opus-4-6
  - name: terminus-2
    model_name: openai/gpt-5.2-codex
    kwargs:
      use_responses_api: true
      reasoning_effort: high
  - name: terminus-2
    model_name: openrouter/qwen/qwen3-coder-next
  - name: terminus-2
    model_name: openrouter/z-ai/glm-5

tasks:
  - path: .

artifacts:
  - /app/mysed.c
