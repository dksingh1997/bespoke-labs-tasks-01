job_name: markdown-html
jobs_dir: ./jobs
n_attempts: 3

orchestrator:
  n_concurrent_trials: 12

environment:
  type: docker

agents:
  - name: terminus-2
    model_name: anthropic/claude-opus-4-6
    kwargs:
      proactive_summarization_threshold: 50000
      record_terminal_session: false
      model_info:
        max_input_tokens: 200000
        max_output_tokens: 128000
  - name: terminus-2
    model_name: openai/gpt-5.2-codex
    kwargs:
      use_responses_api: true
      reasoning_effort: high
      record_terminal_session: false
  - name: terminus-2
    model_name: openrouter/qwen/qwen3-coder
    kwargs:
      record_terminal_session: false
  - name: terminus-2
    model_name: openrouter/z-ai/glm-5
    kwargs:
      record_terminal_session: false

tasks:
  - path: .

artifacts:
  - /app/workspace
