jobs_dir: ./jobs
# opus-only validation run. Re-enable gpt-5.5 by uncommenting below.
n_attempts: 1

orchestrator:
  n_concurrent_trials: 1

environment:
  type: docker
  kwargs:
    sandbox_timeout_secs: 9000

agents:
  - name: terminus-2
    model_name: anthropic/claude-opus-4-8
    kwargs:
      reasoning_effort: max
      temperature: 1.0
#  - name: terminus-2
#    model_name: openai/gpt-5.5
#    kwargs:
#      use_responses_api: true
#      reasoning_effort: xhigh

tasks:
  - path: .

artifacts:
  - /app/workspace
