jobs_dir: ./jobs
n_attempts: 3

orchestrator:
  n_concurrent_trials: 12

environment:
  type: docker
  kwargs:
    sandbox_timeout_secs: 7200

agents:
  - name: terminus-2
    model_name: anthropic/claude-opus-4-6
    kwargs:
      proactive_summarization_threshold: 50000
      model_info:
        max_input_tokens: 200000
        max_output_tokens: 128000
  - name: terminus-2
    model_name: openai/gpt-5.2-codex
    kwargs:
      use_responses_api: true
      reasoning_effort: high
  - name: terminus-2
    model_name: openrouter/qwen/qwen3-coder-next
  - name: terminus-2
    model_name: openrouter/z-ai/glm-5

tasks:
  - path: .

artifacts:
  - /app/workspace
