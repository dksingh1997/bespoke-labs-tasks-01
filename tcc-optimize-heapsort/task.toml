version = "1.0"

[metadata]
author_name = "Compiler Benchmarks Team"
author_email = ""
difficulty = "hard"
category = "compiler-optimization"
tags = ["compiler", "optimization", "tcc", "performance", "code-generation"]

[verifier]
timeout_sec = 1800.0

[agent]
timeout_sec = 7200.0
user = "agent"

[solution.env]
# Injected ONLY into oracle runs. solution/solve.sh writes this token to the
# oracle marker file (/app/.harbor_oracle_marker); tests/test.sh matches it
# (EXPECTED_ORACLE_FLAG) to bypass the GCC-presence anti-cheat so the oracle's
# bundled, agent-extracted gcc is allowed. The agent never sees this value, so a
# normal agent cannot forge the marker to disable the anti-cheat.
HARBOR_ORACLE_FLAG = "tcc-heapsort-814c546f3a3fde6a"

[environment]
build_timeout_sec = 900.0
cpus = 4
memory_mb = 8192
storage_mb = 20480
allow_internet = false
