jobs_dir: ./jobs
# opus-only validation run (2 trials). Re-enable gpt-5.5 by uncommenting below.
n_attempts: 2

orchestrator:
  n_concurrent_trials: 2

environment:
  type: modal
  kwargs:
    sandbox_timeout_secs: 14400

agents:
  - name: terminus-2
    model_name: anthropic/claude-opus-4-8
    kwargs:
      reasoning_effort: max
      temperature: 1.0
#  - name: terminus-2
#    model_name: openai/gpt-5.5
#    kwargs:
#      use_responses_api: true
#      reasoning_effort: xhigh

tasks:
  - path: .

artifacts:
  - /app/compiler-src/tcc
